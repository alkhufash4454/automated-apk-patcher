name: Automated APK Patcher (All Formats)

on:
  workflow_dispatch:

jobs:
  patch-process:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python 3.x
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y unzip wget curl git apktool zipalign

    - name: Download Automation Tools
      run: |
        mkdir -p tools
        cd tools
        pip install reflutter frida-tools pyghidra capstone pyelftools
        
        LATEST_SIGNER_URL=$(curl -s https://api.github.com/repos/patrickfav/uber-apk-signer/releases/latest | grep "browser_download_url.*\.jar" | cut -d '"' -f 4)
        wget -O uber-apk-signer.jar "$LATEST_SIGNER_URL"
        
        git clone https://github.com/LuigiVampa92/merge-apks.git
        # تطبيق إصلاح aapt2 على أداة merge-apks
        sed -i "s/\['apktool', 'b', main_apk_dir\]/\['apktool', 'b', '--use-aapt2', main_apk_dir\]/g" merge-apks/mergeapks.py
        cd ..

    - name: Process, Merge, and Patch Application
      run: |
        mkdir -p input_app output_app workspace
        
        FOUND_ARCHIVE=$(find input_app/ -name "*.xapk" -o -name "*.apks" -o -name "*.zip" | head -n 1)
        
        if [ ! -z "$FOUND_ARCHIVE" ]; then
          echo "[+] تم العثور على الحزمة المقسمة: $FOUND_ARCHIVE"
          cp "$FOUND_ARCHIVE" workspace/archive.zip
          unzip workspace/archive.zip -d workspace/extracted/
          
          # الانتقال لمجلد الملفات المستخرجة لتجنب مشاكل المسارات في أداة الدمج
          cd workspace/extracted/
          ALL_APKS=$(find . -maxdepth 1 -name "*.apk" | tr '\n' ' ')
          
          echo "[+] جاري دمج ملفات الـ APK التالية:"
          echo "$ALL_APKS"
          
          python3 ../../tools/merge-apks/mergeapks.py $ALL_APKS
          
          # نقل الملف المدمج الناتج (result.apk) إلى المجلد الرئيسي
          cd ../../
          mv workspace/extracted/result.apk input_app/target.apk
        fi
        
        # إذا لم يكن هناك xapk ولكن يوجد apk عادي
        if [ -f input_app/*.apk ] && [ ! -f input_app/target.apk ]; then
          mv input_app/*.apk input_app/target.apk
        fi

        if [ ! -f input_app/target.apk ]; then
          echo "[-] خطأ: لم يتم العثور على ملف APK للمعالجة!"
          exit 1
        fi

        echo "[+] بدء معالجة وتعديل ملف الـ APK الأساسي باستخدام reflutter..."
        # reflutter قد يخرج الملف باسم release.RE.apk أو target.RE.apk
        reflutter input_app/target.apk <<EOF
        1
        127.0.0.1
        EOF
        
        # البحث عن الملف الناتج من reflutter ونقله
        PATCHED_APK=$(find . -maxdepth 1 -name "*.RE.apk" | head -n 1)
        if [ -z "$PATCHED_APK" ]; then
            PATCHED_APK=$(find input_app/ -maxdepth 1 -name "*.RE.apk" | head -n 1)
        fi

        if [ ! -z "$PATCHED_APK" ]; then
            mv "$PATCHED_APK" workspace/patched.apk
        else
            echo "[-] خطأ: فشل reflutter في إنتاج ملف معدل!"
            exit 1
        fi

        echo "[+] جاري إعادة توقيع التطبيق ليكون قابلاً للتثبيت..."
        java -jar tools/uber-apk-signer.jar --allowResign -a workspace/patched.apk --out output_app/

    - name: Upload Ready Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Patched-Ready-APK
        path: output_app/*.apk
