name: Automated APK Patcher (All Formats)

on:
  workflow_dispatch:

jobs:
  patch-process:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python 3.x
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y unzip wget curl git

    - name: Download Automation Tools
      run: |
        mkdir -p tools
        cd tools
        pip install reflutter frida-tools pyghidra capstone pyelftools
        
        LATEST_SIGNER_URL=$(curl -s https://api.github.com/repos/patrickfav/uber-apk-signer/releases/latest | grep "browser_download_url.*\.jar" | cut -d '"' -f 4)
        wget -O uber-apk-signer.jar "$LATEST_SIGNER_URL"
        
        git clone https://github.com/LuigiVampa92/merge-apks.git
        cd ..

    - name: Process, Merge, and Patch Application
      run: |
        mkdir -p input_app output_app workspace
        
        FOUND_ARCHIVE=$(find input_app/ -name "*.xapk" -o -name "*.apks" -o -name "*.zip" | head -n 1)
        
        if [ ! -z "$FOUND_ARCHIVE" ]; then
          echo "[+] تم العثور على الحزمة المقسمة: $FOUND_ARCHIVE"
          cp "$FOUND_ARCHIVE" workspace/archive.zip
          unzip workspace/archive.zip -d workspace/extracted/
          
          # تجميع كافة ملفات الـ APK المستخرجة وتمريرها في سطر واحد للأداة
          ALL_APKS=$(find workspace/extracted/ -name "*.apk" | tr '\n' ' ')
          
          echo "[+] جاري دمج ملفات الـ APK التالية:"
          echo "$ALL_APKS"
          
          # تشغيل الأداة وحفظ الملف الناتج باسم merged_base.apk
          python tools/merge-apks/mergeapks.py $ALL_APKS
          
          # الأداة تخرج الملف المدمج بنفس مجلد السكربت عادة أو باسم مخصص، سنبحث عنه وننقله
          mv workspace/extracted/*_merged.apk input_app/target.apk 2>/dev/null || mv *.apk input_app/target.apk 2>/dev/null || mv workspace/merged_base.apk input_app/target.apk 2>/dev/null || mv output.apk input_app/target.apk 2>/dev/null || true
        fi
        
        if [ -f input_app/*.apk ] && [ ! -f input_app/target.apk ]; then
          mv input_app/*.apk input_app/target.apk
        fi

        echo "[+] بدء معالجة وتعديل ملف الـ APK الأساسي..."
        reflutter input_app/target.apk <<EOF
        1
        127.0.0.1
        EOF
        
        mv input_app/target.RE.apk workspace/patched.apk

        echo "[+] جاري إعادة توقيع التطبيق ليكون قابلاً للتثبيت..."
        java -jar tools/uber-apk-signer.jar --allowResign -a workspace/patched.apk --out output_app/

    - name: Upload Ready Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Patched-Ready-APK
        path: output_app/*.apk
